{% extends "base.html" %}

{% block content %}
{% if not has_printers %}
<article class="welcome">
    <header>
        <h2>Welcome to Bamboozle</h2>
    </header>
    <p>No printers configured yet. Add your first Bambu Lab printer to get started.</p>
    <a href="/settings" role="button">Add Printer</a>
</article>
{% else %}
<div class="dashboard-toolbar">
    <div class="camera-controls">
        <button id="all-cams-toggle" class="outline small all-cams-btn" onclick="app.toggleAllCameras(true)" title="Enable all cameras"></button>
    </div>
    <div class="sort-controls">
        <select id="sort-by" class="outline small" onchange="app.setSortBy(this.value)">
            <option value="sort">Sort</option>
            <option value="name">Name</option>
            <option value="status">Status</option>
            <option value="connection">Connection</option>
            <option value="eta">ETA</option>
        </select>
        <button id="sort-dir-btn" class="outline small icon-btn" onclick="app.toggleSortDir()" title="Reverse sort order"></button>
    </div>
</div>
<div id="printer-grid" class="printer-grid">
    <!-- Printer cards rendered by app.js via WebSocket -->
    <p id="loading-msg">Connecting to printers...</p>
</div>
{% endif %}

<div id="toast-container" class="toast-container"></div>
{% endblock %}
