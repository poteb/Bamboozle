<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ printer_name }} - Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .camera-feed { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .camera-feed img { max-width: 100%; max-height: 100vh; object-fit: contain; }
        .camera-feed:fullscreen { background: #000; }
        .cam-overlay {
            position: absolute; top: 0.5rem; right: 0.5rem;
            display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.2s; z-index: 10;
        }
        .camera-feed:hover .cam-overlay { opacity: 1; }
        .camera-feed:fullscreen .cam-overlay { top: 1rem; right: 1rem; }
        .cam-overlay button {
            background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            padding: 0.3rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .cam-overlay button:hover { background: rgba(255,255,255,0.2); }
        .cam-title {
            position: absolute; top: 0.5rem; left: 0.5rem;
            color: rgba(255,255,255,0.7); font-family: sans-serif; font-size: 0.9rem;
            opacity: 0; transition: opacity 0.2s;
        }
        .camera-feed:hover .cam-title { opacity: 1; }
    </style>
</head>
<body>
    <div class="camera-feed">
        <span class="cam-title">{{ printer_name }}</span>
        <img src="/stream/{{ printer_id }}" alt="Camera">
        <div class="cam-overlay">
            <button onclick="toggleFullscreen()" title="Fullscreen"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
            <button onclick="window.close()" title="Close"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
    </div>
    <script>
        function toggleFullscreen() {
            const feed = document.querySelector('.camera-feed');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                feed.requestFullscreen();
            }
        }
    </script>
</body>
</html>
